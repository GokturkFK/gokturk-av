<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 300" width="1280" height="300" role="img" aria-label="GÖKTÜRK-AV — Otonom Araç Siber Test ve Uyumluluk Platformu">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1e"/>
      <stop offset="0.55" stop-color="#0c1426"/>
      <stop offset="1" stop-color="#0a1120"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="300" fill="url(#bg)"/>
  <ellipse cx="250" cy="150" rx="420" ry="300" fill="url(#glow)"/>

  <!-- subtle circuit grid -->
  <g stroke="#1c2b45" stroke-width="1" opacity="0.6">
    <line x1="0" y1="0" x2="1280" y2="0"/><line x1="0" y1="30" x2="1280" y2="30"/><line x1="0" y1="60" x2="1280" y2="60"/><line x1="0" y1="90" x2="1280" y2="90"/><line x1="0" y1="120" x2="1280" y2="120"/><line x1="0" y1="150" x2="1280" y2="150"/><line x1="0" y1="180" x2="1280" y2="180"/><line x1="0" y1="210" x2="1280" y2="210"/><line x1="0" y1="240" x2="1280" y2="240"/><line x1="0" y1="270" x2="1280" y2="270"/>
    <line x1="0" y1="0" x2="0" y2="300"/><line x1="30" y1="0" x2="30" y2="300"/><line x1="60" y1="0" x2="60" y2="300"/><line x1="90" y1="0" x2="90" y2="300"/><line x1="120" y1="0" x2="120" y2="300"/><line x1="150" y1="0" x2="150" y2="300"/><line x1="180" y1="0" x2="180" y2="300"/><line x1="210" y1="0" x2="210" y2="300"/><line x1="240" y1="0" x2="240" y2="300"/><line x1="270" y1="0" x2="270" y2="300"/><line x1="300" y1="0" x2="300" y2="300"/><line x1="330" y1="0" x2="330" y2="300"/><line x1="360" y1="0" x2="360" y2="300"/><line x1="390" y1="0" x2="390" y2="300"/><line x1="420" y1="0" x2="420" y2="300"/><line x1="450" y1="0" x2="450" y2="300"/><line x1="480" y1="0" x2="480" y2="300"/><line x1="510" y1="0" x2="510" y2="300"/><line x1="540" y1="0" x2="540" y2="300"/><line x1="570" y1="0" x2="570" y2="300"/><line x1="600" y1="0" x2="600" y2="300"/><line x1="630" y1="0" x2="630" y2="300"/><line x1="660" y1="0" x2="660" y2="300"/><line x1="690" y1="0" x2="690" y2="300"/><line x1="720" y1="0" x2="720" y2="300"/><line x1="750" y1="0" x2="750" y2="300"/><line x1="780" y1="0" x2="780" y2="300"/><line x1="810" y1="0" x2="810" y2="300"/><line x1="840" y1="0" x2="840" y2="300"/><line x1="870" y1="0" x2="870" y2="300"/><line x1="900" y1="0" x2="900" y2="300"/><line x1="930" y1="0" x2="930" y2="300"/><line x1="960" y1="0" x2="960" y2="300"/><line x1="990" y1="0" x2="990" y2="300"/><line x1="1020" y1="0" x2="1020" y2="300"/><line x1="1050" y1="0" x2="1050" y2="300"/><line x1="1080" y1="0" x2="1080" y2="300"/><line x1="1110" y1="0" x2="1110" y2="300"/><line x1="1140" y1="0" x2="1140" y2="300"/><line x1="1170" y1="0" x2="1170" y2="300"/><line x1="1200" y1="0" x2="1200" y2="300"/><line x1="1230" y1="0" x2="1230" y2="300"/><line x1="1260" y1="0" x2="1260" y2="300"/>
  </g>
  <g stroke="url(#accent)" stroke-width="1.5" fill="none" opacity="0.35">
    <path d="M0 60 H120 L150 90 H300"/>
    <path d="M0 240 H90 L120 210 H240 L270 240 H430"/>
    <path d="M1280 100 H1140 L1110 130 H980"/>
    <path d="M1280 210 H1160 L1130 180 H1010"/>
    <circle cx="150" cy="90" r="4" fill="#38bdf8" stroke="none"/>
    <circle cx="270" cy="240" r="4" fill="#34d399" stroke="none"/>
    <circle cx="1140" cy="100" r="4" fill="#38bdf8" stroke="none"/>
    <circle cx="1130" cy="180" r="4" fill="#34d399" stroke="none"/>
  </g>

  <!-- shield emblem -->
  <g transform="translate(150 150)">
    <path d="M0 -78 L66 -50 V6 C66 46 38 74 0 90 C-38 74 -66 46 -66 6 V-50 Z"
          fill="#0e1a30" stroke="url(#accent)" stroke-width="2.5"/>
    <path d="M0 -78 L66 -50 V6 C66 46 38 74 0 90 C-38 74 -66 46 -66 6 V-50 Z"
          fill="none" stroke="#38bdf8" stroke-width="6" opacity="0.10"/>
    <!-- vehicle + network glyph -->
    <g stroke="url(#accent)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-30 8 h60 l10 16 v10 h-80 v-10 z"/>
      <path d="M-22 8 l6 -14 h24 l6 14"/>
      <circle cx="-18" cy="34" r="6" fill="#0e1a30"/>
      <circle cx="18" cy="34" r="6" fill="#0e1a30"/>
    </g>
    <g fill="#34d399">
      <circle cx="0" cy="-40" r="3.5"/>
      <circle cx="-24" cy="-24" r="3"/>
      <circle cx="24" cy="-24" r="3"/>
    </g>
    <g stroke="#34d399" stroke-width="1.6" opacity="0.7">
      <line x1="0" y1="-40" x2="-24" y2="-24"/>
      <line x1="0" y1="-40" x2="24" y2="-24"/>
      <line x1="-24" y1="-24" x2="0" y2="-6"/>
      <line x1="24" y1="-24" x2="0" y2="-6"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="270" y="140" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="76" font-weight="800" letter-spacing="2" fill="#f1f5f9">GÖKTÜRK<tspan fill="url(#accent)">-AV</tspan></text>

  <!-- tagline -->
  <text x="273" y="184" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="600" fill="#cbd5e1">Otonom Araç Siber Test ve Uyumluluk Platformu</text>

  <!-- standards line -->
  <g transform="translate(273 214)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#38bdf8"/>
    <text x="22" y="11" font-family="'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace" font-size="16" fill="#7dd3fc" letter-spacing="1">UN R155 Annex 5</text>
    <text x="205" y="11" font-family="'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace" font-size="16" fill="#475569">·</text>
    <rect x="222" y="0" width="12" height="12" rx="2" fill="#34d399"/>
    <text x="244" y="11" font-family="'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace" font-size="16" fill="#6ee7b7" letter-spacing="1">ISO/SAE 21434 TARA</text>
  </g>

  <!-- bottom accent bar -->
  <rect x="0" y="295" width="1280" height="5" fill="url(#accent)"/>
</svg>